name: Scheduled layout update 2026-07-15 21:00 JST

on:
  schedule:
    # 2026-07-15 21:00 JST = 2026-07-15 12:00 UTC
    - cron: '0 12 15 7 *'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: scheduled-layout-update-20260715-2100
  cancel-in-progress: false

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Check scheduled year
        if: github.event_name == 'schedule'
        run: |
          if [ "$(date -u +'%Y-%m-%d-%H')" != "2026-07-15-12" ]; then
            echo "This workflow is only intended for 2026-07-15 21:00 JST. Skipping."
            exit 0
          fi

      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Publish reserved index.html
        run: |
          set -euo pipefail
          source_file="scheduled_updates/floormap-20260715-2100.html"
          backup_file="backups/index-before-20260715-2100.html"

          if [ ! -f "$source_file" ]; then
            echo "Missing scheduled HTML: $source_file"
            exit 1
          fi

          mkdir -p "$(dirname "$backup_file")"
          if [ -f index.html ] && [ ! -f "$backup_file" ]; then
            cp index.html "$backup_file"
          fi

          cp "$source_file" index.html

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add index.html "$backup_file"

          if git diff --cached --quiet; then
            echo "No changes to publish."
            exit 0
          fi

          git commit -m "Publish reserved layout for 2026-07-15 21:00 JST"
          git push
